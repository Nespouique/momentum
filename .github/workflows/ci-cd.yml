name: CI/CD

on:
  push:
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"

jobs:
  # Combined lint + build job (avoids duplicate npm ci)
  lint-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Build all packages
        run: npm run build

  # Build Docker images in parallel using matrix
  docker:
    name: Docker ${{ matrix.image }}
    needs: [lint-build]
    if: startsWith(github.ref, 'refs/tags/v') && github.event_name == 'push'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: web
            dockerfile: ./docker/Dockerfile.web
          - image: api
            dockerfile: ./docker/Dockerfile.api
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: |
          echo "short_sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Build and push ${{ matrix.image }} image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/momentum-${{ matrix.image }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/momentum-${{ matrix.image }}:${{ steps.meta.outputs.short_sha }}
            ${{ steps.meta.outputs.version && format('{0}/momentum-{1}:{2}', secrets.DOCKERHUB_USERNAME, matrix.image, steps.meta.outputs.version) || '' }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

      - name: Summary
        run: |
          echo "## Docker Image Built & Pushed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ secrets.DOCKERHUB_USERNAME }}/momentum-${{ matrix.image }}:${{ steps.meta.outputs.short_sha }}\`" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ steps.meta.outputs.version }}" ]; then
            echo "- \`${{ secrets.DOCKERHUB_USERNAME }}/momentum-${{ matrix.image }}:${{ steps.meta.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          fi
